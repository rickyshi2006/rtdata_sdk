name: rtdata SDK CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit and compatibility tests
        run: python -m unittest discover -s tests -v

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify wheel installation
        run: |
          python -m venv /tmp/rtdata-wheel-test
          /tmp/rtdata-wheel-test/bin/pip install dist/*.whl
          /tmp/rtdata-wheel-test/bin/python -c "import rtdata; print(rtdata.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: rtdata-dist
          path: dist/*
